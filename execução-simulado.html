<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Execução de Simulado</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0"
        rel="stylesheet" />
    <style>
        body {
            background-color: #131313;
            color: #e5e2e1;
        }

        .timer-kerning {
            font-variant-numeric: tabular-nums;
        }
    </style>

    <link rel="manifest" href="manifest.json">

</head>

<body class="flex flex-col min-h-screen">

    <header
        class="w-full bg-[#131313] border-b border-white/10 flex items-center justify-between px-5 h-16 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#ccf200]">fitness_center</span>
            <h1 class="font-bold text-lg text-[#ccf200]">EXECUÇÃO</h1>
        </div>
    </header>

    <main class="flex-1 p-5 max-w-2xl mx-auto w-full pb-28">
        <section class="text-center my-8">
            <div class="text-5xl font-extrabold text-[#ccf200] timer-kerning" id="workout-timer">00:00:00</div>
            <p id="status-text" class="text-on-surface-variant font-label-caps uppercase mt-2 tracking-widest">
                Aguardando...</p>

            <button id="skip-btn" onclick="pularDescanso()"
                class="hidden mt-6 text-primary-fixed border border-primary-fixed px-6 py-2 rounded-lg font-bold text-xs uppercase hover:bg-primary-fixed hover:text-[#161e00] transition-all">
                Pular Descanso
            </button>
        </section>

        <button id="start-btn" class="w-full py-4 bg-[#ccf200] text-[#181e00] font-bold rounded-xl mb-6">
            INICIAR SIMULADO
        </button>

        <div id="exercise-container" class="hidden space-y-4">
            <div id="exercise-card" class="bg-[#201f1f] p-6 rounded-xl border-l-4 border-[#ccf200]">
                <h2 class="text-xl font-bold text-white" id="ex-name">Exercício</h2>
            </div>
            <input type="number" class="w-full bg-[#1c1b1b] border border-white/10 p-4 rounded-xl text-white"
                placeholder="Repetições" />
            <button id="next-btn" class="w-full py-4 bg-[#ccf200] text-[#181e00] font-bold rounded-xl">PRÓXIMO</button>
        </div>
    </main>

    <!-- BottomNavBar -->
    <nav id="bottom-nav"
        class="fixed bottom-0 w-full z-50 bg-surface-container/90 backdrop-blur-xl border-t border-primary-fixed/20 h-20 px-4 pb-safe flex justify-around items-center rounded-t-xl shadow-[0_-4px_20px_rgba(195,244,0,0.15)]">

        <a href="index.html"
            class="nav-btn flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:opacity-100 transition-opacity">
            <span class="material-symbols-outlined" data-icon="home">home</span>
            <span class="font-label-caps text-label-caps mt-1 uppercase">Início</span>
        </a>

        <a href="treino.html"
            class="nav-btn flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:opacity-100 transition-opacity">
            <span class="material-symbols-outlined" data-icon="fitness_center">fitness_center</span>
            <span class="font-label-caps text-label-caps mt-1 uppercase">Treino</span>
        </a>

        <a href="simuladotaf.html"
            class="nav-btn flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:opacity-100 transition-opacity">
            <span class="material-symbols-outlined" data-icon="analytics">analytics</span>
            <span class="font-label-caps text-label-caps mt-1 uppercase">Simulado</span>
        </a>

        <a href="historico.html"
            class="nav-btn flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:opacity-100 transition-opacity">
            <span class="material-symbols-outlined" data-icon="history">history</span>
            <span class="font-label-caps text-label-caps mt-1 uppercase">Histórico</span>
        </a>

        <a href="perfil.html"
            class="nav-btn flex flex-col items-center justify-center text-on-surface-variant opacity-70 hover:opacity-100 transition-opacity">
            <span class="material-symbols-outlined" data-icon="person">person</span>
            <span class="font-label-caps text-label-caps mt-1 uppercase">Perfil</span>
        </a>

    </nav>

    <script>
        // 1. Identifica em qual página o usuário está no momento
        const paginaAtual = window.location.pathname.split('/').pop() || 'index.html';

        // 2. Define as classes visuais (Ativo = Aceso | Inativo = Apagado)
        const classesAtivo = ['bg-primary-container', 'text-on-primary-container', 'rounded-xl', 'px-4', 'py-1', 'shadow-[0_0_15px_rgba(195,244,0,0.3)]', 'scale-90', 'duration-200'];
        const classesInativo = ['text-on-surface-variant', 'opacity-70', 'hover:opacity-100', 'transition-opacity'];

        // 3. Percorre todos os botões do menu
        document.querySelectorAll('#bottom-nav .nav-btn').forEach(btn => {
            const linkDoBotao = btn.getAttribute('href');
            const icone = btn.querySelector('.material-symbols-outlined');

            // Regra especial: se a página tiver "simulado" no nome (ex: execução-simulado.html, resultado-simulado.html), mantém o botão "Simulado" aceso
            const isSimuladoArea = linkDoBotao === 'simuladotaf.html' && paginaAtual.includes('simulado');

            if (paginaAtual === linkDoBotao || isSimuladoArea) {
                // Aplica o visual ATIVO
                btn.classList.remove(...classesInativo);
                btn.classList.add(...classesAtivo);
                icone.style.fontVariationSettings = "'FILL' 1"; // Preenche o ícone
            } else {
                // Garante o visual INATIVO
                btn.classList.remove(...classesAtivo);
                btn.classList.add(...classesInativo);
                icone.style.fontVariationSettings = "'FILL' 0"; // Esvazia o ícone
            }
        });
    </script>
    <script>
        // Carrega o simulado configurado
        const simulado = JSON.parse(localStorage.getItem('fitflow_active_sim'));
        const exercicios = simulado ? simulado.exercicios : [];
        let currentIndex = 0;
        let tempoCorrido = 0;
        let timer = null;
        let descansoTimer = null;

        // Botão Iniciar
        document.getElementById('start-btn').addEventListener('click', function () {
            this.classList.add('hidden');
            document.getElementById('exercise-container').classList.remove('hidden');
            iniciarExecucao(0);
        });


        // === INÍCIO DO BLOCO COMPLETO ===

        function iniciarExecucao(index) {
            // 1. Limpa qualquer timer para evitar oscilação
            clearInterval(timer);
            clearInterval(descansoTimer);

            currentIndex = index;
            tempoCorrido = 0;

            // 2. Limpa o input e GARANTE QUE ELE E O BOTÃO PRÓXIMO APAREÇAM na execução
            const inputRep = document.querySelector('input[type="number"]');
            if (inputRep) {
                inputRep.value = "";
                inputRep.classList.remove('hidden');
            }

            const nextBtn = document.getElementById('next-btn');
            if (nextBtn) {
                nextBtn.classList.remove('hidden');
            }

            // 3. Muda o texto do botão no último exercício
            if (currentIndex === exercicios.length - 1 && nextBtn) {
                nextBtn.innerText = "FINALIZAR SIMULADO";
            }

            // 4. Configura os textos e cores para a Execução
            document.getElementById('ex-name').textContent = exercicios[index].nome;
            document.getElementById('status-text').textContent = "EXECUTANDO";
            // Volta a cor do status para cinza 
            document.getElementById('status-text').classList.replace('text-white', 'text-on-surface-variant');
            // Cronômetro volta a ficar Verde
            document.getElementById('workout-timer').classList.replace('text-secondary-fixed-dim', 'text-[#ccf200]');

            timer = setInterval(() => {
                tempoCorrido++;
                document.getElementById('workout-timer').textContent = formatarTempo(tempoCorrido);
            }, 1000);
        }

        // 5. AÇÃO DO BOTÃO PRÓXIMO (Isso aqui que devia ter sumido!)
        document.getElementById('next-btn').addEventListener('click', (e) => {
            e.preventDefault(); // Impede o botão de recarregar a página sem querer

            const inputRep = document.querySelector('input[type="number"]');
            const val = parseFloat(inputRep ? inputRep.value : 0) || 0;
            const exAtual = exercicios[currentIndex];
            exAtual.atingido = val;

            // CÁLCULO DE PONTOS 
            if (exAtual.modo === 'edital' && exAtual.tabelaPontos && exAtual.tabelaPontos.length > 0) {
                const tabelaOrdenada = [...exAtual.tabelaPontos].sort((a, b) => b.marca - a.marca);
                const linhaAtingida = tabelaOrdenada.find(t => val >= t.marca);
                exAtual.pontosGanhos = linhaAtingida ? linhaAtingida.pontos : 0;
            } else {
                exAtual.pontosGanhos = 0;
            }

            clearInterval(timer);

            // Avança para descanso ou finaliza
            if (currentIndex < exercicios.length - 1) {
                iniciarDescanso();
            } else {
                finalizarSimulado();
            }
        });

        function iniciarDescanso() {
            let tempoDescanso = 300; // 5 minutos

            // 1. Banco de frases motivacionais
            const frases = [
                "Respire fundo. Recupere as energias para ir bem na próxima etapa.",
                "Mantenha o foco e a concentração. O próximo exercício exige 100% de você.",
                "Descanse a musculatura. A consistência te leva à aprovação.",
                "Aproveite a pausa para oxigenar o corpo. Você está no caminho certo!"
            ];
            // Sorteia uma frase aleatória
            const fraseSorteada = frases[Math.floor(Math.random() * frases.length)];

            // 2. Esconde o input e o botão "PRÓXIMO" durante o descanso
            const inputRep = document.querySelector('input[type="number"]');
            if (inputRep) inputRep.classList.add('hidden');

            const nextBtn = document.getElementById('next-btn');
            if (nextBtn) nextBtn.classList.add('hidden');

            // 3. Atualiza os textos da tela para o modo Descanso
            document.getElementById('ex-name').textContent = "INTERVALO DE RECUPERAÇÃO";
            document.getElementById('status-text').textContent = fraseSorteada;
            document.getElementById('status-text').classList.replace('text-on-surface-variant', 'text-white');

            // 4. Mantém o botão de PULAR visível e o cronômetro azul
            document.getElementById('skip-btn').classList.remove('hidden');
            document.getElementById('workout-timer').classList.replace('text-[#ccf200]', 'text-secondary-fixed-dim');

            descansoTimer = setInterval(() => {
                tempoDescanso--;
                document.getElementById('workout-timer').textContent = formatarTempo(tempoDescanso);
                if (tempoDescanso <= 0) pularDescanso();
            }, 1000);
        }

        function pularDescanso() {
            clearInterval(descansoTimer);
            document.getElementById('skip-btn').classList.add('hidden'); // Esconde o botão de pular
            iniciarExecucao(currentIndex + 1); // Volta para a execução chamando o próximo
        }

        // === FIM DO BLOCO COMPLETO ===

        function formatarTempo(s) {
            return new Date(s * 1000).toISOString().substr(14, 5);
        }

        // A função vital que joga tudo para o resultado
        // A função vital que joga tudo para o resultado e calcula o APTO
        function finalizarSimulado() {
            let statusFinal = "APTO";
            let totalPontos = 0;

            // Puxa o modo configurado (todos os exercícios do mesmo simulado têm o mesmo modo)
            const modoGlobal = exercicios.length > 0 ? exercicios[0].modo : 'edital';

            if (modoGlobal === 'edital') {
                const metaGlobal = simulado ? (simulado.corte || 0) : 0;
                totalPontos = exercicios.reduce((acc, curr) => acc + (curr.pontosGanhos || 0), 0);

                // Reprova se não atingir a nota de corte global do edital
                if (totalPontos < metaGlobal) {
                    statusFinal = "NÃO APTO";
                }

                // Regra TAF Ouro: Tirar ZERO pontos em qualquer exercício reprova direto
                const zerouAlgum = exercicios.some(ex => (ex.pontosGanhos || 0) === 0);
                if (zerouAlgum) {
                    statusFinal = "NÃO APTO";
                }

            } else {
                // MODO "MÍNIMO EXIGIDO"
                totalPontos = 0; // Não usamos pontos, só aprovação

                // Verifica se em ALGUM exercício o valor atingido foi MENOR que o mínimo configurado
                const reprovouEmAlgum = exercicios.some(ex => ex.atingido < (ex.minimo || 0));

                if (reprovouEmAlgum) {
                    statusFinal = "NÃO APTO";
                }
            }

            const novoId = Date.now();
            const novoHistorico = {
                id: novoId,
                nome: simulado ? simulado.nomeEdital : "Simulado TAF",
                tipo: 'Simulado TAF',
                data: new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'numeric' }),
                pontosTotal: totalPontos,
                status: statusFinal,
                modo: modoGlobal, // Guardamos o modo para exibir correto no histórico
                detalhes: exercicios // Os detalhes vão completos para gerar o comparativo
            };

            // Salva na chave oficial
            const logs = JSON.parse(localStorage.getItem('fitflow_history')) || [];
            logs.push(novoHistorico);
            localStorage.setItem('fitflow_history', JSON.stringify(logs));
            localStorage.setItem('fitflow_last_result_id', novoId);

            window.location.href = `resultado-simulado.html`;
        }


    </script>
</body>

</html>
