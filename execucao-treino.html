<script>
  // 1. Identifica em qual página o usuário está no momento
  const paginaAtual = window.location.pathname.split('/').pop() || 'index.html';
  
  // 2. Define as classes visuais (Ativo = Aceso | Inativo = Apagado)
  const classesAtivo = ['bg-primary-container', 'text-on-primary-container', 'rounded-xl', 'px-4', 'py-1', 'shadow-[0_0_15px_rgba(195,244,0,0.3)]', 'scale-90', 'duration-200'];
  const classesInativo = ['text-on-surface-variant', 'opacity-70', 'hover:opacity-100', 'transition-opacity'];

  // 3. Percorre todos os botões do menu
  document.querySelectorAll('#bottom-nav .nav-btn').forEach(btn => {
    const linkDoBotao = btn.getAttribute('href');
    const icone = btn.querySelector('.material-symbols-outlined');
    
    // Regra especial: se a página tiver "simulado" no nome (ex: execução-simulado.html, resultado-simulado.html), mantém o botão "Simulado" aceso
    const isSimuladoArea = linkDoBotao === 'simuladotaf.html' && paginaAtual.includes('simulado');

    if (paginaAtual === linkDoBotao || isSimuladoArea) {
      // Aplica o visual ATIVO
      btn.classList.remove(...classesInativo);
      btn.classList.add(...classesAtivo);
      icone.style.fontVariationSettings = "'FILL' 1"; // Preenche o ícone
    } else {
      // Garante o visual INATIVO
      btn.classList.remove(...classesAtivo);
      btn.classList.add(...classesInativo);
      icone.style.fontVariationSettings = "'FILL' 0"; // Esvazia o ícone
    }
  });
</script>

 

<script>
 
    let seconds = 0;
    let timerInterval = null;
    let isRunning = false;
    const timerDisplay = document.getElementById('stopwatch');

    // Função de renderização do tempo
    function updateDisplay() {
        const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
        const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        timerDisplay.textContent = `${h}:${m}:${s}`;
    }

    // Pegando os elementos do botão
    const btnTexto = document.getElementById('texto-timer');
    const btnIcone = document.getElementById('icone-timer');

    // Cronômetro clicável unificado
    function toggleTimer() {
        if (!isRunning) {
            isRunning = true;
            timerInterval = setInterval(() => {
                seconds++;
                updateDisplay();
            }, 1000);
            timerDisplay.classList.add('border-primary-fixed');
            if(btnTexto) btnTexto.innerText = "PAUSAR";
            if(btnIcone) btnIcone.innerText = "pause";
        } else {
            isRunning = false;
            clearInterval(timerInterval);
            timerDisplay.classList.remove('border-primary-fixed');
            if(btnTexto) btnTexto.innerText = "RETOMAR";
            if(btnIcone) btnIcone.innerText = "play_arrow";
        }
    }

    // Ativa o clique tanto nos números quanto no botão
    timerDisplay.classList.add('cursor-pointer');
    timerDisplay.addEventListener('click', toggleTimer);

    // GATILHO ADICIONADO AQUI: Manda a página carregar o treino assim que abrir
    document.addEventListener('DOMContentLoaded', carregarTreinoAtivo);

    // Função Carregar Treino com Segurança
    function carregarTreinoAtivo() {
        const container = document.getElementById('container-exercicios-execucao');
        const treinoData = localStorage.getItem('treinoEmExecucao');

        if (!treinoData) {
            container.innerHTML = `
                <div class="p-6 text-center bg-surface-container rounded-xl border border-error/20">
                    <p class="text-error font-bold">Nenhum treino selecionado!</p>
                    <p class="text-sm text-on-surface-variant">Volte na tela de treinos e clique em INICIAR.</p>
                </div>`;
            return;
        }

        try {
            const treino = JSON.parse(treinoData);
            container.innerHTML = ''; 

            if (treino.exercicios && treino.exercicios.length > 0) {
                treino.exercicios.forEach((ex) => {
                    let setsHtml = '';
                    const numSeries = parseInt(ex.series) || 1;
                    for(let i = 1; i <= numSeries; i++) {
                        setsHtml += `
                            <div class="flex items-center justify-between bg-surface-container-high p-3 rounded-lg border border-white/5">
                                <span class="font-label-caps text-on-surface-variant">SET ${i}</span>
                                <span class="font-body-md">${ex.repeticoes || '---'}</span>
                                <button class="w-8 h-8 rounded-lg border border-outline flex items-center justify-center" onclick="this.classList.toggle('bg-primary-container'); this.querySelector('span').classList.toggle('text-transparent')">
                                    <span class="material-symbols-outlined text-transparent text-[20px]">check</span>
                                </button>
                            </div>
                        `;
                    }
                    container.innerHTML += `
                        <div class="bg-surface-container border border-white/5 rounded-xl p-4">
                            <h3 class="font-headline-md text-white mb-3">${ex.nome}</h3>
                            <div class="space-y-2">${setsHtml}</div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = '<div class="p-6 text-center text-on-surface-variant">Este treino está vazio.</div>';
            }
        } catch (e) {
            console.error("Erro ao ler o treino:", e);
        }
    }

    // Função que finaliza o treino
    function finalizarTreinoAtual() {
        const dataHoje = new Date().toISOString().split('T')[0];
        const treinoAtual = JSON.parse(localStorage.getItem('treinoEmExecucao')) || { nome: "Treino Desconhecido" };
        
        // 1. Marca o check individual
        localStorage.setItem(`check-${dataHoje}-${treinoAtual.nome}`, 'concluido');

        // 2. Registra no Histórico
        let historico = JSON.parse(localStorage.getItem('historicoTreinos')) || [];
        
        historico.push({
            nome: treinoAtual.nome,
            data: new Date().toISOString(),
            tipo: treinoAtual.tipo || 'Treino',
            concluido: true
        });
        
        localStorage.setItem('historicoTreinos', JSON.stringify(historico));

        // 3. Feedback e Limpeza
        alert("Treino " + treinoAtual.nome + " registrado com sucesso!");
        localStorage.removeItem('treinoEmExecucao');
        window.location.href = 'index.html';
    }
</script>
