<script>
  // 1. Identifica em qual página o usuário está no momento
  const paginaAtual = window.location.pathname.split('/').pop() || 'index.html';
  
  // 2. Define as classes visuais (Ativo = Aceso | Inativo = Apagado)
  const classesAtivo = ['bg-primary-container', 'text-on-primary-container', 'rounded-xl', 'px-4', 'py-1', 'shadow-[0_0_15px_rgba(195,244,0,0.3)]', 'scale-90', 'duration-200'];
  const classesInativo = ['text-on-surface-variant', 'opacity-70', 'hover:opacity-100', 'transition-opacity'];

  // 3. Percorre todos os botões do menu
  document.querySelectorAll('#bottom-nav .nav-btn').forEach(btn => {
    const linkDoBotao = btn.getAttribute('href');
    const icone = btn.querySelector('.material-symbols-outlined');
    
    // Regra especial: se a página tiver "simulado" no nome (ex: execução-simulado.html, resultado-simulado.html), mantém o botão "Simulado" aceso
    const isSimuladoArea = linkDoBotao === 'simuladotaf.html' && paginaAtual.includes('simulado');

    if (paginaAtual === linkDoBotao || isSimuladoArea) {
      // Aplica o visual ATIVO
      btn.classList.remove(...classesInativo);
      btn.classList.add(...classesAtivo);
      icone.style.fontVariationSettings = "'FILL' 1"; // Preenche o ícone
    } else {
      // Garante o visual INATIVO
      btn.classList.remove(...classesAtivo);
      btn.classList.add(...classesInativo);
      icone.style.fontVariationSettings = "'FILL' 0"; // Esvazia o ícone
    }
  });
</script>

  <script>
    // Micro-interação para os cards
    document.querySelectorAll('.bento-card').forEach(card => {
      card.addEventListener('touchstart', () => {
        card.style.transform = 'scale(0.98)';
      });
      card.addEventListener('touchend', () => {
        card.style.transform = 'scale(1)';
      });
    });

    // Carrega os treinos ao iniciar a página
    document.addEventListener('DOMContentLoaded', () => {
      renderizarTreinos();
    });

    function renderizarTreinos() {
      const listaTreinos = JSON.parse(localStorage.getItem('meusTreinos')) || [];
      const container = document.getElementById('container-treinos');
      if (!container) return;
      container.innerHTML = ''; // Limpa antes de renderizar

      listaTreinos.forEach((treino, index) => {
        const card = document.createElement('div');
        card.id = `treino-dinamico-${index}`;
        card.className = "snap-start min-w-[280px] bento-card rounded-xl overflow-hidden relative flex flex-col justify-between p-5 bg-surface-container active:scale-95 duration-150";

        const isExtra = treino.tipo === 'Extra';
        const corEtiqueta = isExtra ? 'text-secondary-fixed-dim bg-secondary-fixed-dim/10' : 'text-primary-fixed bg-black/40';
        const textoEtiqueta = isExtra ? 'EXTRA' : 'FIXO';

        card.innerHTML = `
        <div>
            <span class="font-label-caps text-label-caps ${corEtiqueta} px-2 py-1 rounded w-fit mb-2 block">${textoEtiqueta}</span>
            
            <h3 class="font-headline-md text-headline-md text-white mb-2">${treino.nome || 'Treino'}</h3>
            <div class="flex gap-4 mt-2 text-on-surface-variant">
                <div class="flex items-center gap-1">
                    <span class="material-symbols-outlined text-[16px]">exercise</span>
                    <span class="font-label-caps text-label-caps">${treino.exercicios ? treino.exercicios.length : 0} EXERC.</span>
                </div>
            </div>
        </div>
        
        <button onclick="iniciarTreino(${index})" class="w-full mt-4 bg-primary-fixed text-[#161e00] font-bold py-2 rounded-lg flex items-center justify-center gap-2 hover:opacity-90 transition-all">
            <span class="material-symbols-outlined">play_arrow</span> INICIAR
        </button>
        
        <div class="flex gap-2 mt-2 relative z-20">
            <button onclick="editarTreino(${index})" class="flex-1 flex items-center justify-center gap-1 bg-surface-variant text-white py-2 rounded-lg hover:bg-white/10 transition-colors">
                <span class="material-symbols-outlined text-[18px]">edit</span>
            </button>
            <button onclick="excluirTreino(${index})" class="flex-1 flex items-center justify-center gap-1 bg-error/10 text-error py-2 rounded-lg hover:bg-error hover:text-white transition-colors">
                <span class="material-symbols-outlined text-[18px]">delete</span>
            </button>
        </div>
    `;

        container.appendChild(card);
      });
    }

    function excluirTreino(index) {
      const confirmacao = confirm('Tem certeza que deseja excluir este treino?');

      if (confirmacao) {
        let treinos = JSON.parse(localStorage.getItem('meusTreinos')) || [];
        treinos.splice(index, 1); // Remove o item do array
        localStorage.setItem('meusTreinos', JSON.stringify(treinos)); // Atualiza o localStorage

        const cardElement = document.getElementById(`treino-dinamico-${index}`);
        if (cardElement) {
          cardElement.remove();
        }
      }
    }

    function editarTreino(index) {
      window.location.href = `criar-treino.html?edit=${index}`;
    }

    function iniciarTreino(index) {
      const treinos = JSON.parse(localStorage.getItem('meusTreinos')) || [];
      const treinoSelecionado = treinos[index];

      localStorage.setItem('treinoEmExecucao', JSON.stringify(treinoSelecionado));
      window.location.href = 'execucao-treino.html';
    }

  </script>
