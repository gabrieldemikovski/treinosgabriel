<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    </head>
<body class="flex items-center justify-center min-h-screen bg-[#131313] p-5">

    <div class="w-full max-w-sm space-y-8">
        <div class="text-center">
            <h1 class="text-4xl font-bold text-[#c3f400]">FITFLOW</h1>
            <p class="text-on-surface-variant text-sm mt-2">Acesse sua conta para sincronizar seus treinos.</p>
        </div>

        <div class="space-y-4">
            <input id="email" type="email" placeholder="E-mail" class="w-full bg-[#1c1b1b] p-4 rounded-xl text-white outline-none border border-white/5 focus:border-[#c3f400]">
            <input id="senha" type="password" placeholder="Senha" class="w-full bg-[#1c1b1b] p-4 rounded-xl text-white outline-none border border-white/5 focus:border-[#c3f400]">
            
            <button onclick="logar()" class="w-full py-4 bg-[#c3f400] text-[#161e00] font-bold rounded-xl active:scale-95 transition-transform">
                ENTRAR
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script>
        // Inicialize o Firebase aqui com suas credenciais
        function logar() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            firebase.auth().signInWithEmailAndPassword(email, senha)
                .then(() => window.location.href = 'index.html')
                .catch(err => alert("Erro ao logar: " + err.message));
        }
    </script>
</body>
</html>
